services:
  redis:
    image: redis:7-alpine
    container_name: vi_ai_core_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  app:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: vi_ai_core_app
    env_file:
      - ../.env.example
    environment:
      # Windows / macOS 下文件监听在容器内可能漏事件，强制轮询可提升热更新稳定性
      WATCHFILES_FORCE_POLLING: "true"
    ports:
      - "8000:8000"
    volumes:
      # 本地代码热挂载：宿主机 app 目录变更后，容器内 uvicorn --reload 自动重载
      - ../app:/workspace/app
    command: ["uvicorn", "app.server:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped
