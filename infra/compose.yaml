name: vi_ai_core_service

services:
  mysql:
    image: mysql:8.4
    container_name: vi_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: vi_ai_core_service
      MYSQL_USER: vi_user
      MYSQL_PASSWORD: vi_password
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "127.0.0.1",
          "-uroot",
          "-proot",
        ]
      interval: 8s
      timeout: 4s
      retries: 15
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: vi_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: vi_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    restart: unless-stopped

  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    container_name: vi_tei
    command:
      - --model-id
      - BAAI/bge-m3
      - --port
      - "80"
    ports:
      - "8080:80"
    volumes:
      - ../.cache/huggingface:/data
    restart: unless-stopped

  app:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: vi_app
    env_file:
      - ../.env.example
    environment:
      # Windows / macOS 下文件监听在容器内可能漏事件，强制轮询可提升热更新稳定性
      WATCHFILES_FORCE_POLLING: "true"
      RAG_EMBEDDING_PROVIDER: "tei"
      RAG_EMBEDDING_MODEL: "BAAI/bge-m3"
      RAG_EMBEDDING_DIMENSION: "1024"
      TEI_BASE_URL: "http://tei:80"
      TEI_TIMEOUT_SECONDS: "30"
    ports:
      - "8000:8000"
    volumes:
      # 本地代码热挂载：宿主机 app 目录变更后，容器内 uvicorn --reload 自动重载
      - ../app:/workspace/app
    command:
      [
        "sh",
        "-c",
        "uvicorn app.server:app --host 0.0.0.0 --port 8000 --reload",
      ]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      tei:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped
