name: vi_ai_core_internal_console

services:
  internal_console:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: vi_internal_console
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://host.docker.internal:8000}
    ports:
      - "5173:5173"
    volumes:
      - ..:/app
      - internal_console_node_modules:/app/node_modules
    command:
      [
        "sh",
        "-c",
        "npm ci && npm run build && npm run preview -- --host 0.0.0.0 --port 5173",
      ]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  internal_console_node_modules:
